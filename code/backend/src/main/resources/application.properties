# Production Configuration

# Database - Railway PostgreSQL
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:pms}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:shashintha}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP) - Production tuning
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# JPA / Hibernate
# NOTE: Using "update" here for development so missing columns get auto-added.
# Flyway handles full migrations; Hibernate fills in any gaps on startup.
# For production, switch to "validate" and rely solely on Flyway migrations.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway - Database migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# JWT - Access token: 15 minutes (900,000 ms) for security
app.jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9u}
app.jwt.expiration-ms=900000

# JWT Refresh Token - 7 days (604,800,000 ms)
app.jwt.refresh-expiration-ms=604800000

# Account lockout - lock for 15 minutes after 5 failed attempts
app.security.max-failed-attempts=5
app.security.lockout-duration-minutes=15

# Rate Limiting
app.security.login-rate-limit-per-minute=5
app.security.signup-rate-limit-per-hour=3

# Super admin seed
app.superadmin.email=${PMS_SUPER_ADMIN_EMAIL:admin@pms.local}
app.superadmin.password=${PMS_SUPER_ADMIN_PASSWORD:ChangeMe123!}
app.superadmin.first-name=${PMS_SUPER_ADMIN_FIRST_NAME:System}
app.superadmin.last-name=${PMS_SUPER_ADMIN_LAST_NAME:Admin}
app.superadmin.mobile-number=${PMS_SUPER_ADMIN_MOBILE:0000000000}

# File uploads
app.upload.dir=${UPLOAD_DIR:uploads/lab-reports}
app.upload.max-file-size=10485760

# Server
server.port=${PORT:8082}

# Jackson - Serialize dates as ISO strings
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
spring.jackson.time-zone=UTC
